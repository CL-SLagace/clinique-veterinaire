<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Clinique vétérinaire – image interactive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
    h1 { margin-bottom: 10px; }
    .container { max-width: 1000px; margin: auto; }
    .image-container { position: relative; }
    img { width: 100%; border-radius: 12px; }
    .zone {
      position: absolute;
      border: 2px solid #2563eb;
      background: rgba(37, 99, 235, 0.2);
      border-radius: 10px;
    }
    .zone:hover { background: rgba(37, 99, 235, 0.35); }
    a { text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simulation clinique vétérinaire</h1>
    <p>Clique sur une zone de l’image pour continuer.</p>

    <div class="image-container">
      <img src="images/clinique.png" alt="Clinique vétérinaire">

      <!-- Étape 1 -->
      <a href="examen.html">
        <div class="zone" style="top:60%; left:5%; width:40%; height:20%;"></div>
      </a>

      <!-- Étape 2 -->
      <a href="cas.html">
        <div class="zone" style="top:60%; left:55%; width:40%; height:20%;"></div>
      </a>
    </div>
  </div>
</body>
</html>
